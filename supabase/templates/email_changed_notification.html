<!doctype html>
<html lang="en">
  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Your email has changed</title>
  </head>
  <body style="margin:0;padding:0;background-color:#f5f4f1;color:#121212;">
    <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="background-color:#f5f4f1;">
      <tr>
        <td align="center" style="padding:28px 14px;">
          <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="max-width:560px;background-color:#ffffff;border:1px solid #e3e2de;border-radius:14px;overflow:hidden;">
            <tr>
              <td style="background-color:#121212;padding:20px 24px;">
                <table role="presentation" cellpadding="0" cellspacing="0" border="0">
                  <tr>
                    <td style="width:36px;height:36px;border-radius:10px;background-color:rgba(255,255,255,0.12);text-align:center;font-size:18px;line-height:36px;">⛺</td>
                    <td style="padding-left:10px;font-family:Georgia, 'Times New Roman', serif;font-size:24px;line-height:1;color:#faf9f6;letter-spacing:-0.4px;">Campsite</td>
                  </tr>
                </table>
              </td>
            </tr>
            <tr>
              <td style="padding:28px 24px 12px 24px;font-family:Arial, Helvetica, sans-serif;">
                <p style="margin:0 0 10px 0;font-size:24px;line-height:1.3;font-family:Georgia, 'Times New Roman', serif;color:#121212;">
                  Your email address has changed
                </p>
                <p style="margin:0;color:#4f4f4f;font-size:15px;line-height:1.6;">
                  Your Campsite account email was updated{{ if .OldEmail }} from
                  <strong style="color:#121212;">{{ .OldEmail }}</strong>{{ end }}{{ if .Email }} to
                  <strong style="color:#121212;">{{ .Email }}</strong>{{ end }}.
                </p>
              </td>
            </tr>
            <tr>
              <td style="padding:12px 24px 28px 24px;font-family:Arial, Helvetica, sans-serif;">
                <div style="background-color:#f5f4f1;border:1px solid #e3e2de;border-radius:10px;padding:12px;">
                  <p style="margin:0;color:#6b6b6b;font-size:12px;line-height:1.6;">
                    If you did not make this change, secure your account immediately and contact support.
                  </p>
                </div>
              </td>
            </tr>
          </table>
          <p style="margin:14px 0 0 0;font-family:Arial, Helvetica, sans-serif;font-size:11px;line-height:1.5;color:#8a8a8a;">
            © Common Ground Studios Ltd
          </p>
        </td>
      </tr>
    </table>
  </body>
</html>
